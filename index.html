<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worldforge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root { --bg:#080808; --surface:#111111; --border:rgba(255,255,255,0.06); --gold:#c4aa7a; --gold-dim:#7a6e58; --text:#f0ece4; --text-dim:#5a5450; --text-mid:#9a9490; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }
#setup { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; text-align:center; }
.wf-wordmark { font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:8px; text-transform:uppercase; color:var(--gold); margin-bottom:52px; }
#setup h2 { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:300; margin-bottom:8px; }
#setup p { font-size:12px; color:var(--text-dim); margin-bottom:32px; }
.key-input { width:100%; max-width:460px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:15px 20px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; margin-bottom:12px; display:block; transition:border-color 0.3s; }
.key-input:focus { border-color:rgba(196,170,122,0.4); }
.key-input::placeholder { color:#2a2620; }
.btn { background:var(--gold); border:none; border-radius:8px; padding:14px 36px; color:#060606; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; letter-spacing:2.5px; text-transform:uppercase; cursor:pointer; transition:background 0.2s,transform 0.15s; }
.btn:hover { background:#d4ba8a; transform:translateY(-1px); }
.btn:disabled { background:#252220; color:#4a4440; cursor:not-allowed; transform:none; }
#hero { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; text-align:center; position:relative; }
.headline { font-family:'Cormorant Garamond',serif; font-size:clamp(52px,9vw,96px); font-weight:300; line-height:0.95; margin-bottom:24px; }
.headline em { font-style:italic; color:var(--gold); }
.subline { font-size:11px; color:var(--text-dim); letter-spacing:3px; margin-bottom:60px; text-transform:uppercase; }
.brief-wrap { display:flex; gap:8px; width:100%; max-width:620px; }
.brief-input { flex:1; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:17px 22px; color:var(--text); font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:300; outline:none; transition:border-color 0.3s; font-style:italic; }
.brief-input::placeholder { color:#252220; }
.brief-input:focus { border-color:rgba(196,170,122,0.3); }
.status { margin-top:18px; font-size:11px; color:var(--text-dim); letter-spacing:1px; min-height:16px; }
.change-key-link { margin-top:48px; font-size:10px; color:#252220; cursor:pointer; letter-spacing:1.5px; text-transform:uppercase; transition:color 0.2s; }
.change-key-link:hover { color:var(--text-dim); }
#board { display:none; padding:80px 48px; max-width:1480px; margin:0 auto; }
.board-meta { text-align:center; margin-bottom:56px; }
.board-label { font-size:10px; letter-spacing:5px; text-transform:uppercase; color:var(--gold-dim); margin-bottom:12px; }
.board-brief-title { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,3vw,40px); font-weight:300; font-style:italic; color:var(--text); line-height:1.3; }
.world-palette { margin-bottom:64px; }
.palette-title { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--text-dim); margin-bottom:16px; text-align:center; }
.palette-row { display:flex; gap:4px; height:80px; border-radius:12px; overflow:hidden; }
.palette-swatch { flex:1; position:relative; cursor:default; transition:flex 0.4s cubic-bezier(0.22,1,0.36,1); overflow:hidden; }
.palette-swatch:hover { flex:2; }
.palette-swatch::after { content:''; position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.55) 0%,transparent 60%); }
.palette-swatch-info { position:absolute; bottom:10px; left:14px; z-index:2; opacity:0; transition:opacity 0.25s; }
.palette-swatch:hover .palette-swatch-info { opacity:1; }
.palette-swatch-name { font-family:'Cormorant Garamond',serif; font-size:14px; color:#fff; margin-bottom:2px; }
.palette-swatch-hex { font-size:9px; color:rgba(255,255,255,0.55); letter-spacing:1px; }
.divider { display:flex; align-items:center; gap:16px; margin-bottom:40px; }
.divider-line { flex:1; height:1px; background:var(--border); }
.divider-label { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--text-dim); white-space:nowrap; }
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; margin-bottom:64px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; opacity:0; animation:riseIn 0.65s cubic-bezier(0.22,1,0.36,1) forwards; transition:transform 0.35s cubic-bezier(0.22,1,0.36,1),border-color 0.3s,box-shadow 0.35s; }
.card:hover { transform:translateY(-6px); border-color:rgba(196,170,122,0.2); box-shadow:0 24px 48px rgba(0,0,0,0.4); }
.card-img-wrap { width:100%; height:210px; position:relative; overflow:hidden; }
.card-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; position:relative; z-index:2; transition:transform 0.5s cubic-bezier(0.22,1,0.36,1); }
.card:hover .card-img-wrap img { transform:scale(1.05); }
.card-grad { position:absolute; inset:0; z-index:1; }
.card-color-strip { display:flex; height:4px; }
.card-color-strip span { flex:1; }
.card-body { padding:20px 22px 22px; }
.card-name { font-family:'Cormorant Garamond',serif; font-size:21px; font-weight:600; color:var(--text); margin-bottom:8px; line-height:1.2; }
.card-insight { font-size:12px; font-weight:300; color:var(--text-mid); line-height:1.8; margin-bottom:16px; }
.card-footer { display:flex; align-items:center; justify-content:space-between; }
.card-tag { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--text-dim); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.swatches { display:flex; gap:4px; }
.swatch { width:14px; height:14px; border-radius:3px; border:1px solid rgba(255,255,255,0.1); position:relative; cursor:default; transition:transform 0.2s; }
.swatch:hover { transform:scale(1.5); z-index:10; }
.swatch:hover::after { content:attr(data-hex); position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:var(--text); font-size:9px; padding:3px 6px; border-radius:3px; white-space:nowrap; border:1px solid rgba(255,255,255,0.08); pointer-events:none; }
.new-brief-btn { display:block; margin:0 auto; background:transparent; border:1px solid rgba(196,170,122,0.15); color:var(--gold-dim); padding:12px 32px; font-family:'DM Sans',sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; cursor:pointer; border-radius:8px; transition:all 0.25s; }
.new-brief-btn:hover { border-color:var(--gold); color:var(--gold); }
@keyframes riseIn { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div id="setup">
  <div class="wf-wordmark">Worldforge</div>
  <h2>Connect your Groq API Key</h2>
  <p>One-time setup — saved in your browser.</p>
  <input type="password" class="key-input" id="setup-key" placeholder="gsk_..." />
  <button class="btn" onclick="saveKey()">Enter Worldforge</button>
</div>

<div id="hero">
  <div class="wf-wordmark">Worldforge</div>
  <h1 class="headline">One brief.<br><em>One world.</em></h1>
  <p class="subline">Creative intelligence for every brief</p>
  <div class="brief-wrap">
    <input type="text" class="brief-input" id="brief" placeholder="Japanese matcha brand, premium and calm…" />
    <button class="btn" id="gen-btn" onclick="generate()">Generate</button>
  </div>
  <p class="status" id="status"></p>
  <p class="change-key-link" onclick="resetKey()">Change API key</p>
</div>

<div id="board">
  <div class="board-meta">
    <p class="board-label">Creative World for</p>
    <h2 class="board-brief-title" id="board-brief"></h2>
  </div>
  <div class="world-palette">
    <p class="palette-title">World Palette</p>
    <div class="palette-row" id="palette-row"></div>
  </div>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-label">8 Cultural Elements</div>
    <div class="divider-line"></div>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
  <button class="new-brief-btn" onclick="newBrief()">← New Brief</button>
</div>

<script>
var PROMPT = "You are the creative intelligence engine for Worldforge. Given a creative brief, return a JSON object with two keys: 'world_palette' (array of exactly 3 objects with: color_name (evocative 2-3 words), hex (single hex code), mood (3-4 words)) and 'elements' (array of exactly 8 objects with: element_name (2-4 evocative words), emotional_significance (3-5 words), insight_line (one precise poetic sentence), image_prompt (extremely specific photographic description - exact subject, lighting, mood, composition - NOT generic), color_palette (array of exactly 3 hex codes)). Return ONLY raw JSON. No markdown. No explanation.";

window.onload = function() {
  if (localStorage.getItem('wf_api_key')) { show('setup',false); show('hero',true); }
};

function saveKey() {
  var k = document.getElementById('setup-key').value.trim();
  if (!k) return;
  localStorage.setItem('wf_api_key', k);
  show('setup',false); show('hero',true);
}

function resetKey() {
  localStorage.removeItem('wf_api_key');
  show('hero',false); show('board',false); show('setup',true);
}

function show(id, visible) {
  var el = document.getElementById(id);
  el.style.display = visible ? (id==='hero' ? 'flex' : 'block') : 'none';
}

async function generate() {
  var key = localStorage.getItem('wf_api_key');
  var brief = document.getElementById('brief').value.trim();
  var btn = document.getElementById('gen-btn');
  var status = document.getElementById('status');
  if (!brief) { status.textContent='Enter a brief first.'; return; }
  if (!key) { resetKey(); return; }
  btn.disabled=true; btn.textContent='Generating…';
  status.textContent='Building your world…';
  try {
    var res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:3500,temperature:0.85,messages:[{role:'system',content:PROMPT},{role:'user',content:brief}]})
    });
    var data = await res.json();
    if (data.error) throw new Error(data.error.message);
    var raw = data.choices[0].message.content.replace(/```json/g,'').replace(/```/g,'').trim();
    var parsed = JSON.parse(raw);
    renderBoard(brief, parsed);
  } catch(err) {
    status.textContent='Error: '+(err.message||'Try again.');
    btn.disabled=false; btn.textContent='Generate';
  }
}

function renderBoard(brief, data) {
  show('hero',false); show('board',true);
  document.getElementById('board-brief').textContent = brief;
  var elements = data.elements || [];
  var palette = data.world_palette || [];

  // World Palette
  var pr = document.getElementById('palette-row');
  pr.innerHTML = '';
  palette.forEach(function(p) {
    var s = document.createElement('div');
    s.className = 'palette-swatch';
    s.style.background = p.hex;
    s.innerHTML = '<div class="palette-swatch-info"><div class="palette-swatch-name">'+(p.color_name||'')+'</div><div class="palette-swatch-hex">'+(p.hex||'')+' &mdash; '+(p.mood||'')+'</div></div>';
    pr.appendChild(s);
  });

  // Cards
  var grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  elements.forEach(function(el, i) {
    var cols = (el.color_palette && el.color_palette.length>=3) ? el.color_palette : ['#1a2a3a','#2a1a3a','#0a1a0a'];
    var grad = 'linear-gradient(145deg,'+cols[0]+' 0%,'+cols[1]+' 50%,'+cols[2]+' 100%)';
    var imgPrompt = el.image_prompt || el.element_name;
    var imgUrl = 'https://image.pollinations.ai/prompt/'+encodeURIComponent(imgPrompt)+'?width=600&height=420&nologo=true&seed='+Math.floor(Math.random()*9999);
    var sw = cols.map(function(c){ return '<div class="swatch" style="background:'+c+'" data-hex="'+c+'"></div>'; }).join('');
    var strip = cols.map(function(c){ return '<span style="background:'+c+'"></span>'; }).join('');

    var card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i*0.07)+'s';
    card.innerHTML =
      '<div class="card-img-wrap">'
      +'<div class="card-grad" style="background:'+grad+'"></div>'
      +'<img src="'+imgUrl+'" alt="'+el.element_name+'">'
      +'</div>'
      +'<div class="card-color-strip">'+strip+'</div>'
      +'<div class="card-body">'
      +'<div class="card-name">'+(el.element_name||'')+'</div>'
      +'<div class="card-insight">'+(el.insight_line||'')+'</div>'
      +'<div class="card-footer">'
      +'<div class="card-tag">'+(el.emotional_significance||'')+'</div>'
      +'<div class="swatches">'+sw+'</div>'
      +'</div></div>';
    grid.appendChild(card);
  });
}

function newBrief() {
  show('board',false); show('hero',true);
  document.getElementById('brief').value='';
  document.getElementById('gen-btn').disabled=false;
  document.getElementById('gen-btn').textContent='Generate';
  document.getElementById('status').textContent='';
}

document.addEventListener('keydown', function(e) {
  if (e.key!=='Enter') return;
  if (document.getElementById('hero').style.display==='flex') generate();
  if (document.getElementById('setup').style.display!=='none') saveKey();
});
</script>
</body>
</html>
