<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Worldforge</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #c9a96e;
      --accent-dim: #7a5f3a;
      --text: #f0ece4;
      --text-muted: #6b6560;
      --text-dim: #9a9590;
      --radius: 4px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      position: relative;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo-mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 48px;
      opacity: 0.8;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(64px, 10vw, 120px);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -2px;
      text-align: center;
      margin-bottom: 24px;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .tagline {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 64px;
      text-align: center;
    }

    /* INPUT AREA */
    .input-wrap {
      width: 100%;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    .input-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 12px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: border-color 0.3s;
    }

    .input-row:focus-within {
      border-color: var(--accent-dim);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      padding: 16px 20px;
      resize: none;
      height: 58px;
      min-height: 58px;
      max-height: 58px;
      line-height: 1.5;
    }

    textarea::placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    .generate-btn {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      padding: 0 28px;
      height: 58px;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
      min-width: 140px;
    }

    .generate-btn:hover { background: #d4b47a; }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 12px;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
    }

    /* STATUS */
    .status {
      margin-top: 40px;
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      text-align: center;
      min-height: 20px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .status.visible { opacity: 1; }

    /* WORLD BOARD */
    .world-section {
      padding: 80px 24px 120px;
      max-width: 1400px;
      margin: 0 auto;
      display: none;
    }

    .world-header {
      display: flex;
      align-items: baseline;
      gap: 24px;
      margin-bottom: 16px;
    }

    .world-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .world-brief {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-style: italic;
      color: var(--text-dim);
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 48px;
    }

    /* CREATIVE BRIEF PARAGRAPH */
    .brief-paragraph {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      line-height: 1.8;
      color: var(--text-dim);
      max-width: 800px;
      margin: 0 auto 64px;
      text-align: center;
      font-style: italic;
      padding: 0 24px;
      border-left: 2px solid var(--accent-dim);
      text-align: left;
    }

    /* GRID */
    .world-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
    }

    @media (max-width: 1100px) { .world-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) { .world-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .world-grid { grid-template-columns: 1fr; } }

    /* CARD */
    .card {
      position: relative;
      background: var(--surface);
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
      background: #1a1a1a;
    }

    .card:hover .card-image { transform: scale(1.04); }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, transparent 100%);
      pointer-events: none;
    }

    .card-body {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 20px 20px;
    }

    .card-number {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 8px;
      color: #fff;
    }

    .card-insight {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-style: italic;
      color: rgba(240,236,228,0.7);
      line-height: 1.5;
    }

    /* Photo credit */
    .card-credit {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 9px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.4);
      background: rgba(0,0,0,0.5);
      padding: 3px 7px;
      border-radius: 2px;
      text-decoration: none;
    }

    .card-credit:hover { color: rgba(255,255,255,0.7); }

    /* IMAGE LOADING SKELETON */
    .img-skeleton {
      width: 100%;
      aspect-ratio: 3/4;
      background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* COLOR PALETTE */
    .palette-section {
      margin-top: 48px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .palette-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .palette-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.2s;
      cursor: default;
      title: attr(data-color);
    }

    .palette-swatch:hover { transform: scale(1.2); }

    /* ERROR */
    .error-msg {
      color: #c0392b;
      font-size: 13px;
      letter-spacing: 1px;
      margin-top: 12px;
      display: none;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <div class="logo-mark">Creative Intelligence Platform</div>
    <h1>World<em>forge</em></h1>
    <p class="tagline">One brief. One world. Every creative aligned.</p>

    <div class="input-wrap">
      <label class="input-label" for="brief">Your brief</label>
      <div class="input-row">
        <textarea id="brief" rows="2" placeholder="Japanese matcha brand, premium and calm…"></textarea>
        <button class="generate-btn" id="generateBtn" onclick="generateWorld()">Generate</button>
      </div>
      <p class="hint">Type a one-line brief. Worldforge does the rest.</p>
      <p class="error-msg" id="errorMsg"></p>
    </div>

    <div class="status" id="status">Building your world…</div>
  </section>

  <!-- WORLD OUTPUT -->
  <section class="world-section" id="worldSection">
    <div class="world-header">
      <span class="world-title">Your World</span>
      <span class="world-brief" id="worldBriefLabel"></span>
    </div>
    <div class="divider"></div>

    <p class="brief-paragraph" id="briefParagraph"></p>

    <div class="world-grid" id="worldGrid"></div>

    <div class="palette-section" id="paletteSection" style="display:none">
      <span class="palette-label">Palette</span>
      <div id="paletteSwatches" style="display:flex;gap:10px;flex-wrap:wrap;"></div>
    </div>
  </section>

  <script>
    // ── CONFIG ──────────────────────────────────────────────────────────────
    const GROQ_API_KEY = localStorage.getItem('groq_api_key') || promptForGroqKey();
    const UNSPLASH_ACCESS_KEY = 'z2_9UCj20l9fm5lE8znTVJp-Qd4qt399NEke3YHx6gk'; // ← Replace this in GitHub

    function promptForGroqKey() {
      const key = prompt('Enter your Groq API key:');
      if (key) localStorage.setItem('groq_api_key', key);
      return key;
    }

    // ── GROQ SYSTEM PROMPT ──────────────────────────────────────────────────
    const SYSTEM_PROMPT = `You are a world-class creative director. Given a one-line brief, identify 8 emotionally and culturally significant elements that define the creative world of this brief.

For each element:
- element_name: A poetic, evocative name (2-4 words)
- emotional_significance: Why this element matters emotionally (1 sentence)
- insight_line: A sharp, memorable creative insight (max 12 words, no clichés)
- unsplash_query: A precise 3-5 word search query for Unsplash that will return a stunning, relevant editorial photograph

Also return:
- brief_paragraph: A 3-sentence creative brief paragraph that a creative director would write. Evocative, specific, directional.
- color_palette: An array of 5 hex color codes that define this world's visual identity

Think like a Cannes-winning creative director. Find moments of tension, beauty, and cultural specificity — not generic objects.

Return ONLY valid JSON. No markdown. No explanation. This exact structure:
{
  "elements": [
    {
      "element_name": "",
      "emotional_significance": "",
      "insight_line": "",
      "unsplash_query": ""
    }
  ],
  "brief_paragraph": "",
  "color_palette": ["#hex1", "#hex2", "#hex3", "#hex4", "#hex5"]
}`;

    // ── MAIN FUNCTION ───────────────────────────────────────────────────────
    async function generateWorld() {
      const brief = document.getElementById('brief').value.trim();
      if (!brief) return;

      const btn = document.getElementById('generateBtn');
      const status = document.getElementById('status');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      errorMsg.style.display = 'none';
      setStatus('Summoning creative intelligence…');

      try {
        // Step 1: Call Groq
        const groqRes = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${GROQ_API_KEY}`
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              { role: 'user', content: `Brief: ${brief}` }
            ],
            temperature: 0.85,
            max_tokens: 2000
          })
        });

        if (!groqRes.ok) throw new Error('Groq API failed');

        const groqData = await groqRes.json();
        const raw = groqData.choices[0].message.content;
        const clean = raw.replace(/```json|```/g, '').trim();
        const world = JSON.parse(clean);

        setStatus('Curating images from the world…');

        // Step 2: Fetch Unsplash images for each element
        document.getElementById('worldBriefLabel').textContent = `"${brief}"`;
        document.getElementById('briefParagraph').textContent = world.brief_paragraph;
        document.getElementById('worldSection').style.display = 'block';
        document.getElementById('worldGrid').innerHTML = '';

        // Show palette
        if (world.color_palette) {
          const swatches = document.getElementById('paletteSwatches');
          swatches.innerHTML = '';
          world.color_palette.forEach(hex => {
            const s = document.createElement('div');
            s.className = 'palette-swatch';
            s.style.background = hex;
            s.title = hex;
            swatches.appendChild(s);
          });
          document.getElementById('paletteSection').style.display = 'flex';
        }

        // Render cards with Unsplash images
        for (let i = 0; i < world.elements.length; i++) {
          const el = world.elements[i];
          const card = createCard(el, i + 1);
          document.getElementById('worldGrid').appendChild(card);

          // Fetch Unsplash image
          fetchUnsplashImage(el.unsplash_query, card, el);
          
          // Stagger card appearance
          setTimeout(() => card.classList.add('visible'), i * 80);
        }

        setStatus('');
        document.getElementById('worldSection').scrollIntoView({ behavior: 'smooth' });

      } catch (err) {
        console.error(err);
        setStatus('');
        errorMsg.textContent = 'Something went wrong. Check your API key and try again.';
        errorMsg.style.display = 'block';
      }

      btn.disabled = false;
    }

    // ── CREATE CARD (skeleton first) ────────────────────────────────────────
    function createCard(el, num) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="img-skeleton" id="skeleton-${num}"></div>
        <div class="card-overlay"></div>
        <div class="card-body">
          <div class="card-number">0${num}</div>
          <div class="card-name">${el.element_name}</div>
          <div class="card-insight">${el.insight_line}</div>
        </div>
      `;
      return card;
    }

    // ── FETCH UNSPLASH IMAGE ────────────────────────────────────────────────
    async function fetchUnsplashImage(query, card, el) {
      try {
        const res = await fetch(
          `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=3&orientation=portrait`,
          {
            headers: { 'Authorization': `Client-ID ${UNSPLASH_ACCESS_KEY}` }
          }
        );
        const data = await res.json();

        if (data.results && data.results.length > 0) {
          const photo = data.results[0];
          const imgUrl = photo.urls.regular;
          const photographer = photo.user.name;
          const photoLink = photo.links.html;

          // Replace skeleton with real image
          const skeleton = card.querySelector('[id^="skeleton"]');
          const img = document.createElement('img');
          img.className = 'card-image';
          img.src = imgUrl;
          img.alt = el.element_name;
          img.loading = 'lazy';

          img.onload = () => {
            skeleton.replaceWith(img);

            // Add photographer credit
            const credit = document.createElement('a');
            credit.className = 'card-credit';
            credit.href = `${photoLink}?utm_source=worldforge&utm_medium=referral`;
            credit.target = '_blank';
            credit.rel = 'noopener';
            credit.textContent = `📷 ${photographer} / Unsplash`;
            card.appendChild(credit);

            // Trigger download tracking (Unsplash requirement)
            triggerDownload(photo.links.download_location);
          };

          img.onerror = () => {
            skeleton.style.background = '#1a1a1a';
          };
        }
      } catch (err) {
        console.error('Unsplash fetch failed for:', query, err);
      }
    }

    // ── TRIGGER DOWNLOAD (Unsplash ToS requirement) ─────────────────────────
    async function triggerDownload(downloadLocation) {
      try {
        await fetch(`${downloadLocation}?client_id=${UNSPLASH_ACCESS_KEY}`);
      } catch(e) {}
    }

    // ── HELPERS ─────────────────────────────────────────────────────────────
    function setStatus(msg) {
      const s = document.getElementById('status');
      s.textContent = msg;
      s.classList.toggle('visible', !!msg);
    }

    // Allow Enter to submit (Shift+Enter for newline)
    document.getElementById('brief').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        generateWorld();
      }
    });
  </script>
</body>
</html>
