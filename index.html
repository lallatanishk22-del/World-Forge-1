<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Worldforge</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111; --border: #1e1e1e;
      --accent: #c9a96e; --accent-dim: #7a5f3a;
      --text: #f0ece4; --text-muted: #6b6560; --text-dim: #9a9590;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9; opacity: 0.3; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); }

    .settings-btn { position: fixed; top: 20px; right: 20px; z-index: 500; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-size: 20px; padding: 8px 12px; cursor: pointer; transition: all 0.2s; line-height: 1; }
    .settings-btn:hover { border-color: var(--accent); color: var(--accent); }
    .settings-panel { position: fixed; top: 70px; right: 20px; z-index: 500; background: var(--surface); border: 1px solid var(--border); padding: 24px; width: 320px; display: none; }
    .settings-panel.open { display: block; }
    .settings-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }
    .settings-field { margin-bottom: 16px; }
    .settings-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-dim); margin-bottom: 8px; display: block; }
    .settings-input { width: 100%; background: #0a0a0a; border: 1px solid var(--border); color: var(--text); font-family: 'Syne', sans-serif; font-size: 12px; padding: 10px 12px; outline: none; transition: border-color 0.2s; }
    .settings-input:focus { border-color: var(--accent-dim); }
    .settings-input::placeholder { color: var(--text-muted); font-size: 11px; }
    .settings-save { width: 100%; background: var(--accent); color: #0a0a0a; border: none; padding: 12px; font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
    .settings-save:hover { background: #d4b47a; }
    .settings-note { font-size: 10px; color: var(--text-muted); margin-top: 12px; font-family: 'Cormorant Garamond', serif; font-style: italic; line-height: 1.5; }
    .key-status { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; background: #c0392b; vertical-align: middle; }
    .key-status.set { background: #27ae60; }

    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; position: relative; }
    .hero::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(201,169,110,0.05) 0%, transparent 70%); pointer-events: none; }
    .logo-mark { font-family: 'Cormorant Garamond', serif; font-size: 11px; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; color: var(--accent); margin-bottom: 48px; opacity: 0.8; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(64px,10vw,120px); font-weight: 300; line-height: 0.9; letter-spacing: -2px; text-align: center; margin-bottom: 24px; }
    h1 em { font-style: italic; color: var(--accent); }
    .tagline { font-size: 13px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 64px; text-align: center; }
    
    .input-wrap { width: 100%; max-width: 680px; position: relative; z-index: 1; }
    .input-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent-dim); margin-bottom: 12px; display: block; }
    .input-row { display: flex; border: 1px solid var(--border); background: var(--surface); transition: border-color 0.3s; }
    .input-row:focus-within { border-color: var(--accent-dim); }
    textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; padding: 16px 20px; resize: none; height: 58px; min-height: 58px; max-height: 58px; line-height: 1.5; }
    textarea::placeholder { color: var(--text-muted); font-style: italic; }
    .generate-btn { background: var(--accent); color: #0a0a0a; border: none; padding: 0 28px; height: 58px; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; white-space: nowrap; min-width: 140px; }
    .generate-btn:hover { background: #d4b47a; }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .hint-text { font-size: 11px; color: var(--text-muted); margin-top: 12px; font-style: italic; font-family: 'Cormorant Garamond', serif; text-align: center; }
    .error-msg { color: #c0392b; font-size: 13px; margin-top: 12px; display: none; font-family: 'Cormorant Garamond', serif; font-style: italic; text-align: center; }
    .status { margin-top: 40px; font-size: 12px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; text-align: center; min-height: 20px; opacity: 0; transition: opacity 0.4s; }
    .status.visible { opacity: 1; }

    .output { display: none; padding: 80px 24px; max-width: 900px; margin: 0 auto; }
    .output.visible { display: block; }

    .output-section { background: var(--surface); border: 1px solid var(--border); padding: 32px; margin-bottom: 24px; }
    .output-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 4px 12px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; font-family: 'Syne', sans-serif; }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .output-content { font-family: 'Cormorant Garamond', serif; font-size: 17px; line-height: 1.8; color: var(--text); }
    .output-content.large { font-size: 24px; font-weight: 300; font-style: italic; line-height: 1.4; }
    
    .visual-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 24px; }
    @media(max-width: 768px) { .visual-grid { grid-template-columns: repeat(2, 1fr); } }
    .visual-card { position: relative; aspect-ratio: 3/4; overflow: hidden; background: #1a1a1a; }
    .visual-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .visual-card:hover .visual-img { transform: scale(1.05); }
    .img-skeleton { width: 100%; height: 100%; background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    
    .shoot-list { list-style: none; }
    .shoot-list li { padding-left: 24px; position: relative; margin-bottom: 16px; font-family: 'Cormorant Garamond', serif; font-size: 16px; line-height: 1.7; color: var(--text); }
    .shoot-list li::before { content: attr(data-num); position: absolute; left: 0; color: var(--accent); font-weight: 600; font-size: 14px; }
    
    .how-list { list-style: none; }
    .how-list li { padding-left: 20px; position: relative; margin-bottom: 12px; font-family: 'Cormorant Garamond', serif; font-size: 15px; line-height: 1.7; color: var(--text-dim); }
    .how-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent-dim); font-size: 12px; top: 2px; }
  </style>
</head>
<body>

  <button class="settings-btn" onclick="toggleSettings()">⚙</button>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">API SETTINGS</div>
    <div class="settings-field">
      <label class="settings-label"><span class="key-status" id="groqStatus"></span>Groq API Key</label>
      <input class="settings-input" id="groqKeyInput" type="password" placeholder="gsk_xxxxxxxxxxxxxxxx"/>
      <div style="font-size:10px;color:var(--text-muted);margin-top:6px;">console.groq.com</div>
    </div>
    <div class="settings-field">
      <label class="settings-label"><span class="key-status" id="unsplashStatus"></span>Unsplash Key</label>
      <input class="settings-input" id="unsplashKeyInput" type="password" placeholder="xxxxxxxxxxxxxxxxxxxxxxxx"/>
      <div style="font-size:10px;color:var(--text-muted);margin-top:6px;">unsplash.com/developers</div>
    </div>
    <button class="settings-save" onclick="saveKeys()">Save Keys</button>
    <p class="settings-note">Stored in browser only</p>
  </div>

  <section class="hero">
    <div class="logo-mark">From Idea to Shoot</div>
    <h1>World<em>forge</em></h1>
    <p class="tagline">Here's exactly what you shoot next.</p>
    
    <div class="input-wrap">
      <label class="input-label" for="brief">Your idea</label>
      <div class="input-row">
        <textarea id="brief" placeholder="Morning commute. Everyone's in their own world…"></textarea>
        <button class="generate-btn" id="generateBtn" onclick="generate()">Generate</button>
      </div>
      <p class="hint-text">Describe your idea. We'll tell you exactly how to shoot it.</p>
      <p class="error-msg" id="errorMsg"></p>
    </div>
    <div class="status" id="status"></div>
  </section>

  <div class="output" id="output">
    <div class="output-section">
      <div class="output-label">
        <span>🎬 IDEA</span>
      </div>
      <div class="output-content" id="idea"></div>
    </div>

    <div class="output-section">
      <div class="output-label">
        <span>🎯 HOOK</span>
        <button class="copy-btn" onclick="copyText('hook')">COPY</button>
      </div>
      <div class="output-content large" id="hook"></div>
    </div>

    <div class="output-section">
      <div class="output-label">
        <span>🎥 WHAT TO SHOOT</span>
        <button class="copy-btn" onclick="copyText('whatToShoot')">COPY</button>
      </div>
      <ol class="shoot-list" id="whatToShoot"></ol>
    </div>

    <div class="output-section">
      <div class="output-label">
        <span>📸 VISUAL INSPIRATION</span>
      </div>
      <div class="visual-grid" id="visualGrid"></div>
    </div>

    <div class="output-section">
      <div class="output-label">
        <span>✍️ CAPTION</span>
        <button class="copy-btn" onclick="copyText('caption')">COPY</button>
      </div>
      <div class="output-content" id="caption"></div>
    </div>

    <div class="output-section">
      <div class="output-label">
        <span>⚡ HOW TO SHOOT</span>
      </div>
      <ul class="how-list" id="howToShoot"></ul>
    </div>
  </div>

  <script>
    // ========================================
    // PASTE YOUR API KEYS HERE FOR DEMO
    // ========================================
    var DEMO_GROQ_KEY = '';  // ← YOUR GROQ KEY
    var DEMO_UNSPLASH_KEY = '';  // ← YOUR UNSPLASH KEY
    
    var GROQ_API_KEY = localStorage.getItem('groq_api_key') || DEMO_GROQ_KEY;
    var UNSPLASH_ACCESS_KEY = localStorage.getItem('unsplash_access_key') || DEMO_UNSPLASH_KEY;

    window.addEventListener('load', function() {
      updateKeyStatuses();
      if (!GROQ_API_KEY || !UNSPLASH_ACCESS_KEY) toggleSettings();
    });

    // Close settings panel when clicking outside
    document.addEventListener('click', function(e) {
      var panel = document.getElementById('settingsPanel');
      var btn = document.querySelector('.settings-btn');
      if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn) {
        panel.classList.remove('open');
      }
    });

    function toggleSettings() {
      document.getElementById('settingsPanel').classList.toggle('open');
    }

    function saveKeys() {
      var g = document.getElementById('groqKeyInput').value.trim();
      var u = document.getElementById('unsplashKeyInput').value.trim();
      if (g) { GROQ_API_KEY = g; localStorage.setItem('groq_api_key', g); }
      if (u) { UNSPLASH_ACCESS_KEY = u; localStorage.setItem('unsplash_access_key', u); }
      updateKeyStatuses();
      document.getElementById('settingsPanel').classList.remove('open');
    }

    function updateKeyStatuses() {
      document.getElementById('groqStatus').className = 'key-status' + (GROQ_API_KEY ? ' set' : '');
      document.getElementById('unsplashStatus').className = 'key-status' + (UNSPLASH_ACCESS_KEY ? ' set' : '');
    }

var SYSTEM_PROMPT = 'You are a creative director who gives SHOOTABLE directions.\n\n' +
'INPUT: An idea\n' +
'OUTPUT: Exact instructions for shooting it\n\n' +
'CRITICAL: Return ONLY valid JSON. No explanation. No preamble. Just the JSON object.\n\n' +
'RULES:\n' +
'- No abstract words (nostalgia, escape, etc.)\n' +
'- No genre labels (Bollywood, K-pop)\n' +
'- Everything must be action-based\n' +
'- Shootable with a phone\n' +
'- No complex setups\n\n' +
'STRUCTURE:\n\n' +
'IDEA: (1 line concept)\n\n' +
'HOOK: (strong opening line for video/post)\n\n' +
'WHAT TO SHOOT: (4-6 specific shots)\n' +
'- Format: "Close-up: person doing X" or "Wide: environment showing Y"\n' +
'- Must be visual actions, not concepts\n' +
'- Each shot = one sentence\n' +
'- Use camera terms: close-up, medium, wide, pan, cut\n\n' +
'CAPTION: (short, punchy line)\n\n' +
'HOW TO SHOOT: (practical instructions)\n' +
'- 3-5 simple tips\n' +
'- Focus on: location, equipment, shooting style\n' +
'- Keep it simple (phone, one location, natural light)\n\n' +
'FINAL CHECK:\n' +
'"Can a normal person shoot this today with their phone?"\n' +
'If NO → simplify\n\n' +
'RESPONSE FORMAT (CRITICAL):\n' +
'Return ONLY this JSON structure with no additional text:\n' +
'{\n' +
'  "idea": "one line concept",\n' +
'  "hook": "strong opening",\n' +
'  "what_to_shoot": ["shot 1", "shot 2", "shot 3", "shot 4"],\n' +
'  "caption": "short caption",\n' +
'  "how_to_shoot": ["tip 1", "tip 2", "tip 3"]\n' +
'}';

    function generate() {
      var brief = document.getElementById('brief').value.trim();
      if (!brief) return;
      if (!GROQ_API_KEY) { toggleSettings(); return; }

      var btn = document.getElementById('generateBtn');
      var errorMsg = document.getElementById('errorMsg');
      btn.disabled = true;
      errorMsg.style.display = 'none';
      setStatus('Generating shoot plan…');

      fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_API_KEY },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            { role: 'user', content: brief }
          ],
          temperature: 0.8,
          max_tokens: 1500
        })
      })
      .then(function(res) {
        if (!res.ok) return res.text().then(function(e) { throw new Error('API Error: ' + res.status); });
        return res.json();
      })
      .then(function(data) {
        var raw = data.choices[0].message.content;
        
        // Remove markdown code blocks
        raw = raw.replace(/```json\n?/g, '').replace(/```\n?/g, '');
        
        // Try to extract JSON if wrapped in text
        var jsonMatch = raw.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
          raw = jsonMatch[0];
        }
        
        raw = raw.trim();
        
        var result;
        try { 
          result = JSON.parse(raw); 
        } catch(e) { 
          console.error('Parse error. Raw response:', raw);
          throw new Error('Could not parse response. Please try again.'); 
        }
        
        renderOutput(result);
        
        setStatus('');
        btn.disabled = false;
      })
      .catch(function(err) {
        console.error(err);
        setStatus('');
        document.getElementById('errorMsg').textContent = 'Error: ' + err.message;
        document.getElementById('errorMsg').style.display = 'block';
        btn.disabled = false;
      });
    }

    function renderOutput(data) {
      document.getElementById('idea').textContent = data.idea || '';
      document.getElementById('hook').textContent = data.hook || '';
      document.getElementById('caption').textContent = data.caption || '';
      
      var shootList = document.getElementById('whatToShoot');
      shootList.innerHTML = '';
      (data.what_to_shoot || []).forEach(function(shot, i) {
        var li = document.createElement('li');
        li.setAttribute('data-num', (i + 1) + '.');
        li.textContent = shot;
        shootList.appendChild(li);
      });
      
      var howList = document.getElementById('howToShoot');
      howList.innerHTML = '';
      (data.how_to_shoot || []).forEach(function(tip) {
        var li = document.createElement('li');
        li.textContent = tip;
        howList.appendChild(li);
      });
      
      // Fetch visual inspiration
      fetchVisualInspiration(data.what_to_shoot || []);
      
      var output = document.getElementById('output');
      output.classList.add('visible');
      output.scrollIntoView({ behavior: 'smooth' });
    }

    function fetchVisualInspiration(shots) {
      if (!UNSPLASH_ACCESS_KEY) return;
      
      var grid = document.getElementById('visualGrid');
      grid.innerHTML = '';
      
      // Take first 6 shots for images
      var shotsToVisualize = shots.slice(0, 6);
      
      shotsToVisualize.forEach(function(shot, index) {
        var card = document.createElement('div');
        card.className = 'visual-card';
        card.innerHTML = '<div class="img-skeleton"></div>';
        grid.appendChild(card);
        
        // Extract keywords from shot description
        var query = extractImageQuery(shot);
        
        setTimeout(function() {
          fetchUnsplashImage(query, card);
        }, index * 300);
      });
    }

    function extractImageQuery(shot) {
      // Remove camera terms and extract key visual words
      var cleaned = shot.toLowerCase()
        .replace(/close-up:|medium:|wide:|pan:|cut:|shot:|→/gi, '')
        .trim();
      
      // Take first 6 words
      var words = cleaned.split(' ').slice(0, 6).join(' ');
      return words;
    }

    function fetchUnsplashImage(query, card) {
      fetch('https://api.unsplash.com/search/photos?query=' + encodeURIComponent(query) + '&per_page=1&orientation=portrait', {
        headers: { 'Authorization': 'Client-ID ' + UNSPLASH_ACCESS_KEY }
      })
      .then(function(r) {
        if (!r.ok) throw new Error('Unsplash failed');
        return r.json();
      })
      .then(function(data) {
        if (!data.results || data.results.length === 0) throw new Error('No results');
        
        var photo = data.results[0];
        var skeleton = card.querySelector('.img-skeleton');
        
        if (skeleton) {
          var img = document.createElement('img');
          img.className = 'visual-img';
          img.src = photo.urls.regular || photo.urls.small;
          img.alt = 'Visual reference';
          skeleton.replaceWith(img);
        }
      })
      .catch(function(err) {
        console.error('Image fetch error:', err);
        // Leave skeleton if fetch fails
      });
    }

    function setStatus(msg) {
      var s = document.getElementById('status');
      s.textContent = msg;
      s.classList.toggle('visible', !!msg);
    }

    function copyText(elementId) {
      var el = document.getElementById(elementId);
      var text = '';
      
      if (el.tagName === 'OL') {
        var items = el.querySelectorAll('li');
        items.forEach(function(li, i) {
          text += (i + 1) + '. ' + li.textContent + '\n';
        });
      } else {
        text = el.textContent;
      }
      
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          showCopyFeedback(event.target);
        }).catch(function(err) {
          console.error('Copy failed:', err);
        });
      } else {
        var textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showCopyFeedback(event.target);
      }
    }

    function showCopyFeedback(btn) {
      var originalText = btn.textContent;
      btn.textContent = 'COPIED!';
      btn.style.color = 'var(--accent)';
      btn.style.borderColor = 'var(--accent)';
      
      setTimeout(function() {
        btn.textContent = originalText;
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 1500);
    }

    document.getElementById('brief').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
    });
  </script>
</body>
</html>
